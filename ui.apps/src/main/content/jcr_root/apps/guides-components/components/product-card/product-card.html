<sly data-sly-use.productCardObj="com.adobe.guides.aem.components.core.models.ProductCardModel"
     data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-sly-test.hasContent="${productCardObj.productCardBeanList}"/>

<div class="gu-container" data-sly-test="${hasContent}">
  <div class="gu-product-card-container" data-sly-list.productDetails="${productCardObj.productCardBeanList}">
    <!-- card 1 -->
    <div class="gu-product-card">
      <div class="gu-product-card--icon-container">
        <img
          src="${productDetails.productIconPath || '/content/dam/guides/common-images/icons/product-icon.svg'}"
          alt="Product Icon"
        />
      </div>
      <a class="gu-product-card--title" href="${productDetails.productLink}">${productDetails.productTitle}
        <svg class="gu-product-card--arrow-icon">
          <use xlink:href="/content/dam/guides/common-images/icons/sprite.svg#right-arrow"></use>
        </svg>
      </a>
      <div class="gu-product-card--description">
        ${productDetails.productDescription}
      </div>
    </div>
  </div>
</div>
<sly data-sly-call="${template.placeholder @ isEmpty=!hasContent, classAppend='gu-container'}"></sly>
