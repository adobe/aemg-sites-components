<div data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     class="cmp-page-feedback" id="page-feedback-component">

        <!--/* State 1: Initial question */-->
        <section id="page-feedback-prompt" class="cmp-page-feedback__prompt">
            <span class="cmp-page-feedback__question">${'Was this page helpful?' @ i18n}</span>
            <div class="cmp-page-feedback__actions">
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--positive yes-button" type="button">
                    <span class="cmp-page-feedback__icon cmp-page-feedback__icon--positive" aria-hidden="true"></span>
                    <span>${'Yes, thanks' @ i18n}</span>
                </button>
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--negative no-button" type="button">
                    <span class="cmp-page-feedback__icon cmp-page-feedback__icon--negative" aria-hidden="true"></span>
                    <span>${'Not really' @ i18n}</span>
                </button>
            </div>
        </section>

        <!--/* State 2: Positive feedback form */-->
        <section id="page-feedback-positive" class="cmp-page-feedback__form cmp-page-feedback__form--positive tcx-hide">
            <div class="cmp-page-feedback__form-header">
                <span class="cmp-page-feedback__form-icon cmp-page-feedback__form-icon--positive" aria-hidden="true"></span>
                <span class="cmp-page-feedback__form-heading">${'We\'re glad. Tell us how this page helped.' @ i18n}</span>
            </div>
            <div class="cmp-page-feedback__form-body">
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="found_answer"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Found the answer to my problem' @ i18n}</span>
                </label>
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="understood_instructions"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Understood the instructions' @ i18n}</span>
                </label>
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="liked_feature"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Liked the feature' @ i18n}</span>
                </label>
                <div class="cmp-page-feedback__suggestions">
                    <label class="cmp-page-feedback__suggestions-label">${'Other suggestions' @ i18n}</label>
                    <textarea class="cmp-page-feedback__suggestions-input suggestions-input" placeholder="${'Enter your suggestions' @ i18n}"></textarea>
                </div>
            </div>
            <div class="cmp-page-feedback__form-footer">
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--skip skip-button" type="button">${'Skip' @ i18n}</button>
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--submit submit-button" type="button">${'Submit' @ i18n}</button>
            </div>
        </section>

        <!--/* State 3: Negative feedback form */-->
        <section id="page-feedback-negative" class="cmp-page-feedback__form cmp-page-feedback__form--negative tcx-hide">
            <div class="cmp-page-feedback__form-header">
                <span class="cmp-page-feedback__form-icon cmp-page-feedback__form-icon--negative" aria-hidden="true"></span>
                <span class="cmp-page-feedback__form-heading">${'We\'re sorry. Can you tell us what didn\'t work for you?' @ i18n}</span>
            </div>
            <div class="cmp-page-feedback__form-body">
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="no_answer"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Didn\'t find the answer to my problem' @ i18n}</span>
                </label>
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="unclear_instructions"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Couldn\'t understand the instructions' @ i18n}</span>
                </label>
                <label class="cmp-page-feedback__checkbox">
                    <input type="checkbox" name="reason" value="disliked_feature"/>
                    <span class="cmp-page-feedback__checkbox-box"></span>
                    <span class="cmp-page-feedback__checkbox-label">${'Didn\'t like the feature' @ i18n}</span>
                </label>
                <div class="cmp-page-feedback__suggestions">
                    <label class="cmp-page-feedback__suggestions-label">${'Other suggestions' @ i18n}</label>
                    <textarea class="cmp-page-feedback__suggestions-input suggestions-input" placeholder="${'Enter your suggestions' @ i18n}"></textarea>
                </div>
            </div>
            <div class="cmp-page-feedback__form-footer">
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--skip skip-button" type="button">${'Skip' @ i18n}</button>
                <button class="cmp-page-feedback__btn cmp-page-feedback__btn--submit submit-button" type="button">${'Submit' @ i18n}</button>
            </div>
        </section>

        <!--/* State 4: Thank you confirmation */-->
        <section id="page-feedback-thankyou" class="cmp-page-feedback__thankyou tcx-hide">
            <span class="cmp-page-feedback__thankyou-icon" aria-hidden="true"></span>
            <span class="cmp-page-feedback__thankyou-text">${'Thank you for your feedback. Your response will help improve this page.' @ i18n}</span>
        </section>

    </div>
