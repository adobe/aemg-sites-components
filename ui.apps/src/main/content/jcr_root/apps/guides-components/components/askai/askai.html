<div class="cmp-askai"
     data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-cmp-placeholder="${properties.placeholder || 'Ask a question...'}"
     data-cmp-endpoint="${properties.endpoint || ''}"
     data-cmp-disclaimer="${properties.disclaimerText || 'AI responses may be inaccurate and any offers provided are non-binding.'}">

    <!-- Search Input Bar -->
    <div class="cmp-askai__search-bar">
        <input type="text"
               class="cmp-askai__search-input"
               placeholder="${properties.placeholder @ i18n}"
               id="askai-input"/>
        <button type="button" class="cmp-askai__search-clear" id="askai-clear" title="Clear" style="display:none;"></button>
    </div>

    <!-- AI Summary Response Section -->
    <div class="cmp-askai__summary" id="askai-summary" style="display:none;">
        <div class="cmp-askai__summary-header">
            <div class="cmp-askai__summary-title-group">
                <h3 class="cmp-askai__summary-title">AI summary title</h3>
            </div>
            <div class="cmp-askai__summary-actions">
                <button type="button" class="cmp-askai__action-btn cmp-askai__action-copy" id="askai-copy" title="Copy summary"></button>
                <button type="button" class="cmp-askai__action-btn cmp-askai__action-like" id="askai-like" title="Helpful"></button>
                <button type="button" class="cmp-askai__action-btn cmp-askai__action-dislike" id="askai-dislike" title="Not helpful"></button>
            </div>
        </div>

        <div class="cmp-askai__summary-body" id="askai-body">
            <div class="cmp-askai__summary-content" id="askai-content">
            </div>
        </div>

        <div class="cmp-askai__summary-footer">
            <button type="button" class="cmp-askai__toggle-btn" id="askai-toggle">
                <span id="askai-toggle-text">Show more</span>
            </button>
        </div>

        <div class="cmp-askai__disclaimer">
            <span id="askai-disclaimer-text">AI responses may be inaccurate and any offers provided are non-binding.</span>
            <a href="#" class="cmp-askai__disclaimer-link">Terms</a>
        </div>
    </div>

    <!-- Loading State -->
    <div class="cmp-askai__loading" id="askai-loading" style="display:none;">
        <div class="cmp-askai__loading-spinner"></div>
        <span class="cmp-askai__loading-text">Generating response...</span>
    </div>
</div>
