<div class="cmp-navigation-filter__wrapper">
  <div class="cmp-navigation-filter-container">
    <div class="cmp-navigation-filter__section">
      <!--<i class="cmp-navigation-filter__icon" data-cmp-hook-search="icon"></i>-->
      <img class="cmp-navigation-filter__search-icon" src="${properties.filterSearchIcon}" alt="Filter Search Icon" />
      <input type="text" name="cmp-navigation-filter" placeholder="${'Filter Topics Here'}" />
      <i class="cmp-navigation-filter__closeicon" data-cmp-hook-search="icon"></i>
    </div>
  </div>
  <img class="cmp-navigation__col-icon" src="${properties.collapseIcon}" alt="Collapse Icon" />
</div>

<nav data-sly-use.navigation="com.adobe.guides.aem.components.core.models.Navigation2Model"
  data-sly-use.template="core/wcm/components/commons/v1/templates.html" data-sly-use.groupTemplate="group.html"
  data-sly-call="${groupTemplate.group @ items=navigation.items}"
  data-sly-test.hasContent="${navigation.items.size > 0}" id="${navigation.id}" class="cmp-navigation" itemscope
  itemtype="http://schema.org/SiteNavigationElement" data-cmp-data-layer="${navigation.data.json}"
  aria-label="${navigation.accessibilityLabel}" role="navigation">
</nav>
<sly data-sly-call="${template.placeholder @ isEmpty=!hasContent, classAppend='cmp-navigation'}"></sly>
